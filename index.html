<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>R2-D2 Sphero Console</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0c1014;
      --panel: #141a20;
      --panel-2: #10151a;
      --line: #2b343d;
      --text: #eef4f8;
      --muted: #94a3ad;
      --accent: #38a3ff;
      --accent-2: #f5c542;
      --danger: #ff5b68;
      --ok: #4de08a;
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    html,
    body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 0%, rgba(56, 163, 255, 0.14), transparent 26rem),
        linear-gradient(135deg, #0c1014 0%, #151c22 46%, #0f1113 100%);
      color: var(--text);
      font: 12px/1.25 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button,
    select,
    input[type="text"],
    input[type="number"] {
      min-height: 26px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #0f1419;
      color: var(--text);
    }

    button {
      padding: 4px 8px;
      cursor: pointer;
      white-space: nowrap;
    }

    button:hover,
    button:focus-visible {
      border-color: var(--accent);
      outline: none;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.48;
    }

    .primary:disabled {
      opacity: 0.72;
    }

    button.primary {
      background: #11629c;
      border-color: #1f80ca;
    }

    button.danger {
      background: #6f1d2a;
      border-color: #a83142;
    }

    button.small {
      padding: 2px 6px;
      min-height: 22px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .range-field {
      gap: 3px;
    }

    .range-title {
      color: var(--muted);
    }

    .range-limits {
      display: flex;
      justify-content: space-between;
      color: #6f8491;
      font: 9px/1 Consolas, "Cascadia Mono", monospace;
    }

    #hoverTip {
      position: fixed;
      z-index: 1000;
      max-width: 280px;
      padding: 6px 8px;
      border: 1px solid #3a4650;
      border-radius: 6px;
      background: #090f14;
      color: #eef4f8;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.38);
      font: 11px/1.3 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      opacity: 0;
      pointer-events: none;
      transform: translateY(3px);
      transition: opacity 0.08s ease, transform 0.08s ease;
    }

    #hoverTip.show {
      opacity: 1;
      transform: translateY(0);
    }

    input[type="color"] {
      width: 36px;
      height: 24px;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: transparent;
    }

    label {
      color: var(--muted);
      display: grid;
      gap: 2px;
      min-width: 0;
    }

    .app {
      height: 100dvh;
      padding: 8px;
      display: grid;
      grid-template-rows: 38px minmax(0, 1fr);
      gap: 8px;
    }

    header,
    .panel {
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: var(--radius);
      background: rgba(20, 26, 32, 0.88);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.22);
    }

    header {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 6px 8px;
    }

    h1,
    h2,
    h3 {
      margin: 0;
      letter-spacing: 0;
    }

    h1 {
      font-size: 18px;
      font-weight: 750;
    }

    h2 {
      font-size: 12px;
      color: #d7e8f4;
      text-transform: uppercase;
    }

    h3 {
      font-size: 11px;
      color: var(--accent-2);
      text-transform: uppercase;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      color: var(--muted);
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #5b6570;
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.04);
    }

    .dot.ok { background: var(--ok); }
    .dot.busy { background: var(--accent-2); }
    .dot.bad { background: var(--danger); }

    .toolbar {
      display: flex;
      gap: 6px;
      justify-content: flex-end;
      align-items: center;
      min-width: 0;
    }

    main {
      min-height: 0;
      display: grid;
      grid-template-columns: 0.78fr 0.95fr 1.15fr 1.7fr;
      gap: 8px;
    }

    .panel {
      min-height: 0;
      padding: 8px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 7px;
      overflow: hidden;
    }

    .panel-body {
      min-height: 0;
      display: grid;
      gap: 8px;
      align-content: start;
    }

    .sensors-panel .panel-body {
      grid-template-rows: auto minmax(300px, 1fr) minmax(190px, 0.7fr);
      align-content: stretch;
    }

    .row {
      display: flex;
      gap: 6px;
      align-items: center;
      min-width: 0;
    }

    .row.wrap { flex-wrap: wrap; }
    .row.between { justify-content: space-between; }

    .grid1 {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 6px;
    }

    .grid2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
    }

    .grid3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
    }

    .grid4 {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
    }

    .grid5 {
      display: grid;
      grid-template-columns: auto 96px repeat(4, minmax(0, 1fr));
      gap: 6px;
      align-items: center;
    }

    .readouts {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 5px;
    }

    .readout {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 6px;
      align-items: center;
      min-width: 0;
      padding-bottom: 3px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
    }

    .readout span:first-child {
      color: var(--muted);
    }

    .readout span:last-child {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: right;
    }

    .readout input {
      min-width: 0;
      width: 100%;
      height: 24px;
      padding: 2px 6px;
      text-align: right;
    }

    .droid-wrap {
      position: relative;
      height: 112px;
      display: grid;
      place-items: center;
      background:
        linear-gradient(90deg, transparent 0 48%, rgba(255,255,255,0.05) 48% 52%, transparent 52%),
        linear-gradient(0deg, rgba(255,255,255,0.03), transparent 42%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      overflow: hidden;
    }

    .droid {
      width: 82px;
      height: 98px;
      position: relative;
    }

    .dome {
      position: absolute;
      left: 12px;
      top: 0;
      width: 58px;
      height: 31px;
      border-radius: 34px 34px 8px 8px;
      background: linear-gradient(135deg, #edf4f6, #8f9daa 58%, #f7fbfc);
      border: 2px solid #e7edf2;
      overflow: hidden;
    }

    .dome:before,
    .body:before {
      content: "";
      position: absolute;
      background: #1c7fc5;
      border-radius: 2px;
    }

    .dome:before {
      width: 14px;
      height: 8px;
      left: 9px;
      top: 12px;
    }

    .eye {
      position: absolute;
      right: 10px;
      top: 10px;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #111;
      box-shadow: 0 0 0 2px #4a5660 inset;
    }

    .body {
      position: absolute;
      left: 17px;
      top: 31px;
      width: 48px;
      height: 55px;
      border-radius: 8px 8px 14px 14px;
      background: linear-gradient(100deg, #f6fbfe, #a8b5bd 64%, #f4f8fb);
      border: 2px solid #d5e2ea;
      overflow: hidden;
    }

    .body:before {
      width: 18px;
      height: 24px;
      left: 14px;
      top: 12px;
      box-shadow: 0 22px 0 #d04444;
    }

    .leg {
      position: absolute;
      top: 44px;
      width: 18px;
      height: 48px;
      border-radius: 6px;
      background: #d9e3e8;
      border: 2px solid #b8c5cd;
    }

    .leg.left { left: 2px; }
    .leg.right { right: 2px; }

    .foot {
      position: absolute;
      bottom: 0;
      width: 26px;
      height: 11px;
      border-radius: 8px 8px 4px 4px;
      background: #b9c7cf;
      border: 1px solid #dfe8ec;
    }

    .foot.left { left: 0; }
    .foot.right { right: 0; }

    .joy {
      aspect-ratio: 1;
      width: min(100%, 190px);
      margin: 0 auto;
      border-radius: 50%;
      border: 1px solid #33414c;
      background:
        linear-gradient(90deg, transparent calc(50% - 1px), rgba(255,255,255,0.12) 50%, transparent calc(50% + 1px)),
        linear-gradient(0deg, transparent calc(50% - 1px), rgba(255,255,255,0.12) 50%, transparent calc(50% + 1px)),
        radial-gradient(circle, #1a232b 0 36%, #0f151b 37% 100%);
      position: relative;
      touch-action: none;
    }

    .stick {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 5px 18px rgba(56, 163, 255, 0.45);
      position: absolute;
      left: calc(50% - 17px);
      top: calc(50% - 17px);
      pointer-events: none;
    }

    .seg {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
    }

    .seg button {
      border: 0;
      border-radius: 0;
      background: #0f1419;
      min-height: 24px;
    }

    .seg button + button {
      border-left: 1px solid var(--line);
    }

    .seg button.active {
      background: #1b5f8f;
    }

    .log {
      height: clamp(150px, 22vh, 240px);
      padding: 5px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      background: #080d11;
      color: #b7c6ce;
      font: 10px/1.25 Consolas, "Cascadia Mono", monospace;
      overflow-y: auto;
      overflow-x: hidden;
      white-space: pre-wrap;
      scrollbar-color: #33414c #080d11;
    }

    .stream-graph {
      width: 100%;
      height: clamp(150px, 20vh, 220px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      background: #080d11;
      display: block;
    }

    .sensors-panel .stream-graph,
    .sensors-panel .log {
      height: 100%;
      min-height: 0;
    }

    .mono {
      font-family: Consolas, "Cascadia Mono", monospace;
    }

    .wide { width: 100%; }
    .num { width: 64px; }
    .short { width: 76px; }
    .grow { flex: 1; min-width: 0; }

    .split {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 8px;
    }

    .tight {
      display: grid;
      gap: 5px;
      min-width: 0;
    }

    .section {
      display: grid;
      gap: 5px;
      min-width: 0;
    }

    .drive-status {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6px;
      align-items: center;
      min-height: 28px;
      color: var(--muted);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      padding: 4px 8px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 999px;
      background: #0d1318;
      color: #c6d4dd;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .pill::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #64717c;
      flex: 0 0 auto;
    }

    .pill.ready::before { background: var(--ok); }
    .pill.busy::before { background: var(--accent-2); }

    .checkbox {
      display: flex;
      gap: 4px;
      align-items: center;
      color: var(--muted);
      white-space: nowrap;
    }

    .checkbox input { margin: 0; }

    @media (max-width: 1100px) {
      main {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        grid-template-rows: repeat(2, minmax(0, 1fr));
      }

      .joy { width: min(100%, 132px); }
      .droid-wrap { height: 86px; }
      .droid { transform: scale(0.78); }
      .log { height: clamp(110px, 16vh, 170px); }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>R2-D2 Sphero Console</h1>
      <div class="status">
        <span id="statusDot" class="dot"></span>
        <span id="statusText">Idle</span>
        <span id="deviceName" class="mono"></span>
      </div>
      <div class="toolbar">
        <button id="connectBtn" class="primary">Connect</button>
        <button id="disconnectBtn">Disconnect</button>
        <button id="wakeBtn">Wake</button>
        <button id="panicBtn" class="danger">Stop All</button>
        <button id="sleepBtn">Sleep</button>
      </div>
    </header>

    <main>
      <section class="panel">
        <h2>Bot</h2>
        <div class="panel-body">
          <div class="droid-wrap" aria-hidden="true">
            <div class="droid">
              <div class="dome"><span class="eye"></span></div>
              <div class="body"></div>
              <div class="leg left"></div>
              <div class="leg right"></div>
              <div class="foot left"></div>
              <div class="foot right"></div>
            </div>
          </div>
          <div class="readouts">
            <div class="readout"><span>Battery</span><span id="batteryPct">-</span></div>
            <div class="readout"><span>Voltage</span><span id="batteryVolt">-</span></div>
            <div class="readout"><span>Min V</span><input id="batteryMin" type="number" min="2.8" max="4.2" step="0.01" value="3.00" title="0% voltage"></div>
            <div class="readout"><span>Max V</span><input id="batteryMax" type="number" min="3.7" max="4.5" step="0.01" value="4.40" title="100% voltage"></div>
            <div class="readout"><span>State</span><span id="batteryState">-</span></div>
            <div class="readout"><span>Name</span><span id="btName">-</span></div>
            <div class="readout"><span>App</span><span id="appVersion">-</span></div>
            <div class="readout"><span>SKU</span><span id="sku">-</span></div>
          </div>
          <div class="grid3">
            <button id="refreshPower">Power</button>
            <button id="refreshInfo">Info</button>
            <button id="pingBtn">Ping</button>
          </div>
          <div class="section">
            <h3>Advanced</h3>
            <div class="row">
              <input id="newName" class="grow" type="text" maxlength="15" placeholder="Bluetooth name">
              <button id="setNameBtn">Set</button>
            </div>
            <div class="row">
              <input id="shellCommand" class="grow mono" type="text" placeholder="Shell command">
              <button id="shellBtn">Send</button>
            </div>
            <div class="row">
              <input id="rawDid" class="num mono" type="text" value="16" title="DID">
              <input id="rawCid" class="num mono" type="text" value="00" title="CID">
              <input id="rawData" class="grow mono" type="text" placeholder="Hex bytes">
              <button id="rawSend">Raw</button>
            </div>
          </div>
        </div>
      </section>

      <section class="panel">
        <h2>Drive</h2>
        <div class="panel-body">
          <div class="joy" id="joystick" title="Drag to drive">
            <div class="stick" id="stick"></div>
          </div>
          <div class="drive-status">
            <span id="driveReadyState" class="pill">Tripod drive not prepared</span>
            <button id="prepareDriveBtn">Prepare</button>
          </div>
          <div class="grid2">
            <label class="range-field"><span class="range-title">Speed</span><input id="speed" type="range" min="0" max="255" value="90"><span class="range-limits"><span>0</span><span>255</span></span></label>
            <label>Heading <input id="heading" type="number" min="0" max="359" value="0"></label>
          </div>
          <div class="grid4">
            <button data-drive="0">Fwd</button>
            <button data-drive="270">Left</button>
            <button data-drive="90">Right</button>
            <button data-drive="180">Back</button>
          </div>
          <div class="grid3">
            <button id="driveGo">Go</button>
            <button id="driveStop" class="danger">Stop</button>
            <button id="resetYaw">Aim 0</button>
          </div>
          <div class="row wrap">
            <label class="checkbox"><input id="flagReverse" type="checkbox">Reverse</label>
            <label class="checkbox"><input id="flagTurbo" type="checkbox">Turbo</label>
            <label class="checkbox"><input id="flagFastTurn" type="checkbox">Fast turn</label>
            <label class="checkbox"><input id="flagDrift" type="checkbox">Drift</label>
            <label class="checkbox"><input id="stabilize" type="checkbox" checked>Stabilize</label>
          </div>
          <div class="section">
            <h3>Raw Drive</h3>
            <div class="grid2">
              <label>Left
                <select id="leftMode"><option value="0">Off</option><option value="1">Fwd</option><option value="2">Rev</option></select>
              </label>
              <label>Right
                <select id="rightMode"><option value="0">Off</option><option value="1">Fwd</option><option value="2">Rev</option></select>
              </label>
            </div>
            <div class="grid2">
              <label class="range-field"><span class="range-title">L speed</span><input id="leftSpeed" type="range" min="0" max="255" value="80"><span class="range-limits"><span>0</span><span>255</span></span></label>
              <label class="range-field"><span class="range-title">R speed</span><input id="rightSpeed" type="range" min="0" max="255" value="80"><span class="range-limits"><span>0</span><span>255</span></span></label>
            </div>
            <div class="grid2">
              <button id="rawDriveApply">Apply</button>
              <button id="rawDriveOff">Off</button>
            </div>
          </div>
        </div>
      </section>

      <section class="panel">
        <h2>Droid</h2>
        <div class="panel-body">
          <div class="section">
            <h3>Animation</h3>
            <div class="row">
              <select id="animationSelect" class="grow"></select>
              <button id="playAnim">Play</button>
              <button id="stopAnim">Stop</button>
            </div>
          </div>
          <div class="section">
            <h3>Leg Action</h3>
            <div class="seg" id="legSeg">
              <button data-leg="0">Stop</button>
              <button data-leg="1">3 Legs</button>
              <button data-leg="2">2 Legs</button>
              <button data-leg="3">Waddle</button>
            </div>
            <div class="grid3">
              <button id="readLegAction">Read</button>
              <label class="checkbox"><input id="legNotify" type="checkbox">Notify leg done</label>
            </div>
          </div>
          <div class="split">
            <div class="section">
              <h3>Head</h3>
              <label class="range-field"><span class="range-title">Angle</span><input id="headPosition" type="range" min="-162" max="182" step="1" value="0"><span class="range-limits"><span>-162</span><span>182</span></span></label>
              <div class="grid3">
                <button id="setHead">Set</button>
                <button id="centerHead">Center</button>
                <button id="getHead">Read</button>
              </div>
            </div>
            <div class="section">
              <h3>Leg Pos</h3>
              <div class="grid1">
                <button id="getLeg">Read</button>
              </div>
            </div>
          </div>
          <div class="section">
            <h3>Lights</h3>
            <div class="grid2">
              <label>Front <input id="frontColor" type="color" value="#0a84ff"></label>
              <label>Back <input id="backColor" type="color" value="#ff2020"></label>
            </div>
            <div class="grid2">
              <label class="range-field"><span class="range-title">Logic</span><input id="logicLed" type="range" min="0" max="255" value="180"><span class="range-limits"><span>0</span><span>255</span></span></label>
              <label class="range-field"><span class="range-title">Holo</span><input id="holoLed" type="range" min="0" max="255" value="120"><span class="range-limits"><span>0</span><span>255</span></span></label>
            </div>
            <div class="grid3">
              <button id="applyLeds">Apply</button>
              <button id="ledsOff">Off</button>
              <button id="idleLeds">Idle</button>
            </div>
          </div>
          <div class="section">
            <h3>Sounds</h3>
            <div class="grid3">
              <select id="soundDroid">
                <option value="all">All</option>
                <option value="R2">R2-D2</option>
                <option value="R2Q5">R2-Q5</option>
                <option value="BB8">BB-8</option>
                <option value="BB9E">BB-9E</option>
                <option value="TEST">Test</option>
              </select>
              <select id="soundMood">
                <option value="all">All</option>
                <option value="ALARM">Alarm</option>
                <option value="CHATTY">Chatty</option>
                <option value="EXCITED">Excited</option>
                <option value="HEY">Hey</option>
                <option value="NEGATIVE">Negative</option>
                <option value="POSITIVE">Positive</option>
                <option value="SAD">Sad</option>
              </select>
              <select id="audioMode">
                <option value="0">Now</option>
                <option value="1">If clear</option>
                <option value="2">Queue</option>
              </select>
            </div>
            <div class="row">
              <input id="soundSearch" class="grow" type="text" placeholder="Find sound">
              <button id="randomSound">Random</button>
            </div>
            <div class="row">
              <select id="soundSelect" class="grow"></select>
              <button id="playSound" class="primary">Play</button>
            </div>
            <div class="row">

    let activeTooltipTarget = null;

    function applyTooltipToElement(el, text) {
      if (!el || !text) return;
      el.dataset.tip = text;
      el.removeAttribute("title");
      if (["BUTTON", "INPUT", "SELECT", "CANVAS"].includes(el.tagName) && !el.getAttribute("aria-label")) {
        el.setAttribute("aria-label", text);
      }
      const label = el.closest("label");
      if (label) label.dataset.tip = text;
      const readout = el.closest(".readout");
      if (readout) readout.dataset.tip = text;
    }

    function applyTooltips() {
      Object.entries(TOOLTIP_BY_ID).forEach(([id, text]) => applyTooltipToElement($(id), text));
      TOOLTIP_BY_SELECTOR.forEach(([selector, text]) => {
        document.querySelectorAll(selector).forEach((el) => applyTooltipToElement(el, text));
      });
      bindTooltips();
    }

    function hoverTip() {
      let tip = $("hoverTip");
      if (!tip) {
        tip = document.createElement("div");
        tip.id = "hoverTip";
        tip.setAttribute("role", "tooltip");
        document.body.appendChild(tip);
      }
      return tip;
    }

    function positionTooltip(target) {
      const tip = hoverTip();
      const rect = target.getBoundingClientRect();
      const tipRect = tip.getBoundingClientRect();
      const gap = 8;
      let left = rect.left + rect.width / 2 - tipRect.width / 2;
      let top = rect.top - tipRect.height - gap;
      left = clamp(left, 6, window.innerWidth - tipRect.width - 6);
      if (top < 6) top = rect.bottom + gap;
      if (top + tipRect.height > window.innerHeight - 6) top = window.innerHeight - tipRect.height - 6;
      tip.style.left = `${left}px`;
      tip.style.top = `${top}px`;
    }

    function showTooltip(target) {
      const text = target?.dataset?.tip;
      if (!text) return;
      activeTooltipTarget = target;
      const tip = hoverTip();
      tip.textContent = text;
      tip.classList.remove("show");
      tip.style.left = "0";
      tip.style.top = "0";
      positionTooltip(target);
      tip.classList.add("show");
    }

    function hideTooltip() {
      activeTooltipTarget = null;
      hoverTip().classList.remove("show");
    }

    function bindTooltips() {
      if (bindTooltips.bound) return;
      bindTooltips.bound = true;
      document.addEventListener("pointerover", (event) => {
        const target = event.target.closest("[data-tip]");
        if (target) showTooltip(target);
      });
      document.addEventListener("pointerout", (event) => {
        if (!activeTooltipTarget) return;
        const target = event.target.closest("[data-tip]");
        if (target === activeTooltipTarget && !target.contains(event.relatedTarget)) hideTooltip();
      });
      document.addEventListener("focusin", (event) => {
        const target = event.target.closest("[data-tip]");
        if (target) showTooltip(target);
      });
      document.addEventListener("focusout", hideTooltip);
      window.addEventListener("resize", hideTooltip);
      window.addEventListener("scroll", () => {
        if (activeTooltipTarget) positionTooltip(activeTooltipTarget);
      }, true);
    }

    function parseEnum(text) {
      return text.trim().split(/\s+/).map((item) => {
        const [name, id] = item.split("=");
        return { name, id: Number(id) };
      });
    }

    function enumLabel(item) {
      return item.name.replaceAll("_", " ");
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function u16(value) {
      value = Number(value) & 0xffff;
      return [(value >> 8) & 0xff, value & 0xff];
    }

    function u32(value) {
      value = Number(value) >>> 0;
      return [(value >> 24) & 0xff, (value >> 16) & 0xff, (value >> 8) & 0xff, value & 0xff];
    }

    function f32(value) {
      const view = new DataView(new ArrayBuffer(4));
      view.setFloat32(0, Number(value), false);
      return [...new Uint8Array(view.buffer)];
    }

    function readFloat(bytes, offset = 0) {
      const view = new DataView(new Uint8Array(bytes).buffer);
      return view.getFloat32(offset, false);
    }

    function intFrom(bytes) {
      return bytes.reduce((total, byte) => ((total << 8) | byte) >>> 0, 0);
    }

    function ascii(text) {
      return [...text].map((char) => char.charCodeAt(0) & 0xff);
    }

    function textFrom(bytes) {
      return new TextDecoder().decode(new Uint8Array(bytes)).replace(/\0+$/g, "");
    }

    function hexBytes(text) {
      const clean = text.trim();
      if (!clean) return [];
      return clean.split(/[\s,]+/).map((part) => Number.parseInt(part.replace(/^0x/i, ""), 16) & 0xff);
    }

    function colorBytes(hex) {
      const n = Number.parseInt(hex.slice(1), 16);
      return [(n >> 16) & 0xff, (n >> 8) & 0xff, n & 0xff];
    }

    function log(message) {
      const now = new Date().toLocaleTimeString();
      const logEl = $("log");
      const lines = (logEl.textContent ? logEl.textContent.split("\n") : []).filter(Boolean);
      lines.push(`${now} ${message}`);
      logEl.textContent = lines.slice(-120).join("\n");
      logEl.scrollTop = logEl.scrollHeight;
    }

    function setStatus(kind, message) {
      $("statusText").textContent = message;
      $("statusDot").className = `dot ${kind || ""}`;
    }

    function setConnectionControls(busy = false) {
      const connected = bot.connected;
      $("connectBtn").disabled = busy || connected;
      $("disconnectBtn").disabled = busy || !connected;
      $("wakeBtn").disabled = busy || !connected;
      $("panicBtn").disabled = busy || !connected;
      $("sleepBtn").disabled = busy || !connected;
      $("connectBtn").textContent = connected ? "Connected" : "Connect";
      document.querySelectorAll("main button, main input, main select").forEach((control) => {
        control.disabled = busy || !connected;
      });
    }

    class SpheroV2 {
      constructor() {
        this.device = null;
        this.server = null;
        this.writeChar = null;
        this.notifyChar = null;
        this.seq = 0;
        this.queue = Promise.resolve();
        this.pending = new Map();
        this.listeners = new Map();
        this.collector = [];
        this.rawDriveMode = null;
      }

      get connected() {
        return Boolean(this.device?.gatt?.connected && this.writeChar && this.notifyChar);
      }

      async connect() {
        if (!navigator.bluetooth) {
          throw new Error("Web Bluetooth is unavailable");
        }

        this.device = await navigator.bluetooth.requestDevice({
          acceptAllDevices: true,
          optionalServices: OPTIONAL_SERVICES
        });
        this.device.addEventListener("gattserverdisconnected", () => this.onDisconnect());
        $("deviceName").textContent = this.device.name || "";

        this.server = await this.device.gatt.connect();
        await this.handshake();
        try {
          await this.findApiCharacteristics();
        } catch (error) {
          throw new Error(`${error.message}. Visible services: ${await this.visibleServices()}`);
        }

        await this.notifyChar.startNotifications();
        this.notifyChar.addEventListener("characteristicvaluechanged", (event) => {
          this.addBytes(new Uint8Array(event.target.value.buffer.slice(
            event.target.value.byteOffset,
            event.target.value.byteOffset + event.target.value.byteLength
          )));
        });

        log(`Connected using ${this.profile}`);
      }

      async disconnect() {
        await this.stopDrive();
        if (this.device?.gatt?.connected) {
          this.device.gatt.disconnect();
        }
        this.onDisconnect();
      }

      onDisconnect() {
        this.writeChar = null;
        this.notifyChar = null;
        this.rawDriveMode = null;
        resetDriveRuntime();
        setStatus("", "Disconnected");
        setConnectionControls(false);
        log("Disconnected");
      }

      async getCharacteristic(serviceUuid, characteristicUuid) {
        const service = await this.server.getPrimaryService(serviceUuid);
        return service.getCharacteristic(characteristicUuid);
      }

      async optionalCharacteristic(pairs) {
        const errors = [];
        for (const [serviceUuid, characteristicUuid, label] of pairs) {
          try {
            const characteristic = await this.getCharacteristic(serviceUuid, characteristicUuid);
            return { characteristic, label };
          } catch (error) {
            errors.push(`${label || serviceUuid}: ${error.message}`);
          }
        }
        throw new Error(errors.join(" | "));
      }

      async optionalWrite(pairs, bytes) {
        try {
          const { characteristic, label } = await this.optionalCharacteristic(pairs);
          await this.write(characteristic, bytes);
          log(`Handshake ${label}`);
          return true;
        } catch (error) {
          return false;
        }
      }

      async handshake() {
        await this.optionalWrite([
          [UUID.v2InitService, UUID.v2ForceChar, "v2 force"],
          [UUID.v2InitServiceAlt, UUID.v2ForceChar, "v2 force alt"]
        ], ascii("usetheforce...band"));

        await this.optionalWrite([
          [UUID.classicInitService, UUID.classicAntiDosChar, "classic antidos"]
        ], ascii("011i3"));

        await this.optionalWrite([
          [UUID.classicInitService, UUID.classicTxPowerChar, "classic tx power"]
        ], [7]);

        await this.optionalWrite([
          [UUID.classicInitService, UUID.classicWakeChar, "classic wake"]
        ], [1]);
      }

      async findApiCharacteristics() {
        const v2 = [
          [UUID.v2ApiService, UUID.v2ApiChar, "v2 api"],
          [UUID.v2ApiServiceAlt, UUID.v2ApiChar, "v2 api alt"],
          [UUID.v2ApiServiceAlt2, UUID.v2ApiChar, "v2 api alt2"]
        ];

        try {
          const { characteristic, label } = await this.optionalCharacteristic(v2);
          this.writeChar = characteristic;
          this.notifyChar = characteristic;
          this.profile = label;
          return;
        } catch (v2Error) {
          log(`No v2 API service: ${v2Error.message}`);
        }

        const write = await this.optionalCharacteristic([
          [UUID.classicControlService, UUID.classicCommandChar, "classic command"]
        ]);
        const notify = await this.optionalCharacteristic([
          [UUID.classicControlService, UUID.classicResponseChar, "classic response"]
        ]);
        this.writeChar = write.characteristic;
        this.notifyChar = notify.characteristic;
        this.profile = "classic control";
      }

      async visibleServices() {
        try {
          const services = await this.server.getPrimaryServices();
          return services.map((service) => service.uuid).join(", ");
        } catch (error) {
          return `unavailable: ${error.message}`;
        }
      }

      async write(characteristic, bytes) {
        const data = new Uint8Array(bytes);
        if (characteristic.writeValueWithResponse) {
          await characteristic.writeValueWithResponse(data);
        } else {
          await characteristic.writeValue(data);
        }
      }

      packet(did, cid, data = []) {
        const seq = this.seq;
        this.seq = (this.seq + 1) % 0xff;
        const body = [0x0a, did, cid, seq, ...data];
        body.push(0xff - (body.reduce((sum, byte) => sum + byte, 0) & 0xff));
        const escaped = [0x8d];
        for (const byte of body) {
          if (byte === 0xab) escaped.push(0xab, 0x23);
          else if (byte === 0x8d) escaped.push(0xab, 0x05);
          else if (byte === 0xd8) escaped.push(0xab, 0x50);
          else escaped.push(byte);
        }
        escaped.push(0xd8);
        return { seq, bytes: escaped };
      }

      async send(did, cid, data = [], timeout = 4200) {
        if (!this.connected) throw new Error("Not connected");
        const packet = this.packet(did, cid, data);
        const key = this.key(did, cid, packet.seq);
        const response = new Promise((resolve, reject) => {
          const timer = setTimeout(() => {
            this.pending.delete(key);
            reject(new Error(`Timeout ${did}:${cid}:${packet.seq}`));
          }, timeout);
          this.pending.set(key, { resolve, reject, timer });
        });

        this.queue = this.queue.then(async () => {
          for (let i = 0; i < packet.bytes.length; i += 20) {
            await this.write(this.writeChar, packet.bytes.slice(i, i + 20));
          }
          await delay(120);
        }).catch((error) => log(`Queue ${error.message}`));

        const reply = await response;
        if (reply.err) throw new Error(ERRORS[reply.err] || `Error ${reply.err}`);
        return reply.data;
      }

      once(did, cid, seq = 0xff, timeout = 4200) {
        const key = this.key(did, cid, seq);
        return new Promise((resolve, reject) => {
          const timer = setTimeout(() => {
            this.listeners.delete(key);
            reject(new Error(`Timeout notify ${did}:${cid}`));
          }, timeout);
          this.listeners.set(key, (packet) => {
            clearTimeout(timer);
            this.listeners.delete(key);
            resolve(packet);
          });
        });
      }

      on(did, cid, seq, handler) {
        this.listeners.set(this.key(did, cid, seq), handler);
      }

      key(did, cid, seq) {
        return `${did}:${cid}:${seq}`;
      }

      addBytes(bytes) {
        for (const byte of bytes) {
          this.collector.push(byte);
          if (byte === 0xd8) {
            const raw = this.collector;
            this.collector = [];
            try {
              this.handle(this.parse(raw));
            } catch (error) {
              log(`Parse ${error.message}`);
            }
          }
        }
      }

      parse(raw) {
        if (raw[0] !== 0x8d || raw[raw.length - 1] !== 0xd8) throw new Error("frame");
        const body = [];
        for (let i = 1; i < raw.length - 1; i++) {
          const byte = raw[i];
          if (byte !== 0xab) {
            body.push(byte);
            continue;
          }
          const next = raw[++i];
          if (next === 0x23) body.push(0xab);
          else if (next === 0x05) body.push(0x8d);
          else if (next === 0x50) body.push(0xd8);
          else throw new Error("escape");
        }
        const check = body.pop();
        const expected = 0xff - (body.reduce((sum, byte) => sum + byte, 0) & 0xff);
        if (check !== expected) throw new Error("checksum");

        let offset = 0;
        const flags = body[offset++];
        const hasTarget = flags & 0x10;
        const hasSource = flags & 0x20;
        const isResponse = flags & 0x01;
        const tid = hasTarget ? body[offset++] : null;
        const sid = hasSource ? body[offset++] : null;
        const did = body[offset++];
        const cid = body[offset++];
        const seq = body[offset++];
        const err = isResponse ? body[offset++] : 0;
        return { flags, tid, sid, did, cid, seq, err, data: body.slice(offset) };
      }

      handle(packet) {
        const key = this.key(packet.did, packet.cid, packet.seq);
        const pending = this.pending.get(key);
        if (pending) {
          clearTimeout(pending.timer);
          this.pending.delete(key);
          pending.resolve(packet);
        }

        const exact = this.listeners.get(key);
        const notify = this.listeners.get(this.key(packet.did, packet.cid, 0xff));
        const any = this.listeners.get(this.key(packet.did, packet.cid, "*"));
        if (exact) exact(packet);
        if (notify && notify !== exact) notify(packet);
        if (any && any !== exact && any !== notify) any(packet);
      }

      ping() { return this.send(16, 0, [0xca, 0xfe, 0xba, 0xbe]); }
      shell(text) { return this.send(16, 2, [...ascii(text), 0]); }

      wake() { return this.send(19, 13); }
      sleep() { return this.send(19, 1); }
      batteryVoltage() { return this.send(19, 3); }
      batteryState() { return this.send(19, 4); }
      batteryVoltageState() { return this.send(19, 23); }
      batteryNotify(enable) { return this.send(19, 5, [Number(enable)]); }
      voltageNotify(enable) { return this.send(19, 27, [Number(enable)]); }

      drive(speed, heading, flags = 0) {
        return this.send(22, 7, [clamp(speed, 0, 255), ...u16(heading % 360), flags]);
      }
      stopDrive() { return this.drive(0, Number($("heading").value || 0), 0).catch(() => {}); }
      resetYaw() { return this.send(22, 6); }
      rawMotors(lm, ls, rm, rs) { return this.send(22, 1, [lm, ls, rm, rs]); }
      genericRaw(index, mode, speed) { return this.send(22, 11, [index, mode, ...u16(clamp(speed, 0, 255))]); }
      setStabilization(on) { return this.send(22, 12, [on ? 1 : 0]); }

      async genericDriveMotors(lm, ls, rm, rs) {
        await this.genericRaw(0, lm, ls);
        await this.genericRaw(1, rm, rs);
      }

      async rawDriveMotors(lm, ls, rm, rs) {
        if (this.rawDriveMode === "generic") {
          await this.genericDriveMotors(lm, ls, rm, rs);
          return "generic";
        }
        try {
          await this.rawMotors(lm, ls, rm, rs);
          this.rawDriveMode = "native";
          return "native";
        } catch (error) {
          if (!/restricted|bad command id/i.test(error.message)) throw error;
          this.rawDriveMode = "generic";
          log("Raw motors native command restricted; using R2-D2 generic drive motors");
          await this.genericDriveMotors(lm, ls, rm, rs);
          return "generic";
        }
      }

      playAnimation(id) { return this.send(23, 5, u16(id)); }
      legAction(action) { return this.send(23, 13, [action]); }
      setHeadPosition(value) { return this.send(23, 15, f32(value)); }
      getHeadPosition() { return this.send(23, 20); }
      getLegPosition() { return this.send(23, 22); }
      getLegAction() { return this.send(23, 37); }
      enableLegActionNotify(enable) { return this.send(23, 42, [Number(enable)]); }
      stopAnimation() { return this.send(23, 43); }

      setLeds(mapping) {
        let mask = 0;
        const values = [];
        for (let i = 0; i <= 7; i++) {
          if (mapping.has(i)) {
            mask |= 1 << i;
            values.push(mapping.get(i));
          }
        }
        return this.send(26, 14, [...u16(mask), ...values]);
      }
      idleLeds() { return this.send(26, 25); }
      playAudio(id, mode) { return this.send(26, 7, [...u16(id), mode]); }
      setVolume(value) { return this.send(26, 8, [clamp(value, 0, 255)]); }
      getVolume() { return this.send(26, 9); }
      stopAudio() { return this.send(26, 10); }

      sensorMask(interval, count, mask) { return this.send(24, 0, [...u16(interval), count, ...u32(mask)]); }
      extSensorMask(mask) { return this.send(24, 12, u32(mask)); }
      resetLocator() { return this.send(24, 19); }
      configureCollision(method, x, y, sx, sy, dead) { return this.send(24, 17, [method, x, y, sx, sy, dead]); }
      gyroMaxNotify(enable) { return this.send(24, 15, [Number(enable)]); }
      accelThreshold(value) { return this.send(24, 24, f32(value)); }
      accelActivityNotify(enable) { return this.send(24, 25, [Number(enable)]); }
      gyroThreshold(value) { return this.send(24, 27, f32(value)); }
      gyroActivityNotify(enable) { return this.send(24, 28, [Number(enable)]); }

      mainAppVersion() { return this.send(17, 0); }
      bootVersion() { return this.send(17, 1); }
      boardRevision() { return this.send(17, 3); }
      macAddress() { return this.send(17, 6); }
      processorName() { return this.send(17, 31); }
      sku() { return this.send(17, 40); }

      bluetoothName() { return this.send(25, 4); }
      setBluetoothName(name) { return this.send(25, 3, [...ascii(name.slice(0, 15)), 0]); }
    }

    const bot = new SpheroV2();

    async function run(label, fn) {

        setStatus(bot.connected ? "ok" : "", bot.connected ? "Connected" : "Idle");
        setConnectionControls(false);

    function driveFlags() {
      let flags = $("flagReverse").checked ? 1 : 0;
      if ($("flagTurbo").checked) flags |= 2;
      if ($("flagFastTurn").checked) flags |= 4;
      if ($("flagDrift").checked) flags |= 32;
      return flags;
    }

    function driveFlagSummary(flags = driveFlags()) {
      const state = (mask, label) => `${label} ${(flags & mask) ? "on" : "off"}`;
      return [
        state(2, "turbo"),
        state(4, "fast turn"),
        state(32, "drift"),
        state(1, "reverse")
      ].join(", ");
    }

    const DRIVE_FLAG_LOGS = [

      clearInterval(driveRuntime.rollTimer);

      driveRuntime.lastRaw = null;

    async function waitForLegAction(target, timeout = 4200) {
      const start = performance.now();
      while (performance.now() - start < timeout) {
        await delay(300);
        const data = await bot.getLegAction().catch(() => []);
        if (!data.length) return false;
        if (data[0] === target) return true;
        if (data[0] !== 4 && data[0] !== 0) return data[0] === target;
      }
      return false;
    }

    async function prepareDriveStance() {
      if (driveRuntime.prepared) return;
      if (driveRuntime.preparing) return driveRuntime.preparing;

      driveRuntime.preparing = (async () => {
        setDriveReadyState("busy", "Preparing tripod drive stance");
        log("Preparing drive: tripod stance");
        await bot.stopAnimation().catch(() => {});
        await bot.legAction(1);
        await waitForLegAction(1);
        await bot.setStabilization($("stabilize").checked).catch(() => {});
        driveRuntime.prepared = true;
        setDriveReadyState("ready", "Tripod drive ready");
        log("Drive ready");
      })().finally(() => {
        driveRuntime.preparing = null;
      });

      return driveRuntime.preparing;
    }

    async function sendRoll(speed, heading, flags) {
      speed = clamp(Math.round(speed), 0, 255);
      heading = ((Math.round(heading) % 360) + 360) % 360;
      driveRuntime.lastRoll = { speed, heading, flags };
      return bot.drive(speed, heading, flags);
    }

    function ensureRollLoop() {
      if (driveRuntime.rollTimer) return;
      driveRuntime.rollTimer = setInterval(() => {
        if (!bot.connected || !driveRuntime.lastRoll) return;
        const { speed, heading, flags } = driveRuntime.lastRoll;
        bot.drive(speed, heading, flags).catch((error) => log(`Drive ${error.message}`));
      }, 650);
    }

    async function startRoll(speed = number("speed"), heading = number("heading"), flags = driveFlags()) {
      await stopRawDrive(false);
      await prepareDriveStance();
      ensureRollLoop();
      await sendRoll(speed, heading, flags);
      log(`Roll ${heading} @ ${speed} flags: ${driveFlagSummary(flags)}`);
    }

    async function stopRoll(sendStop = true) {
      clearInterval(driveRuntime.rollTimer);
      driveRuntime.rollTimer = null;
      driveRuntime.lastRoll = null;
      if (sendStop && bot.connected) await bot.stopDrive();
    }

    function rawMotorPayload() {
      return {
        leftMode: number("leftMode"),
        leftSpeed: number("leftSpeed"),
        rightMode: number("rightMode"),
        rightSpeed: number("rightSpeed")
      };
    }

    function ensureRawLoop() {
      if (driveRuntime.rawTimer) return;
      driveRuntime.rawTimer = setInterval(() => {
        if (!bot.connected || !driveRuntime.lastRaw) return;
        const r = driveRuntime.lastRaw;
        bot.rawDriveMotors(r.leftMode, r.leftSpeed, r.rightMode, r.rightSpeed)
          .catch((error) => log(`Raw drive ${error.message}`));
      }, 650);
    }

    async function startRawDrive() {
      await stopRoll(false);
      await prepareDriveStance();
      await bot.setStabilization(false).catch(() => {});
      const payload = rawMotorPayload();
      driveRuntime.lastRaw = payload;
      ensureRawLoop();
      await bot.rawDriveMotors(payload.leftMode, payload.leftSpeed, payload.rightMode, payload.rightSpeed);
      setDriveReadyState("busy", "Raw motors active");
      log(`Raw motors L${payload.leftMode}:${payload.leftSpeed} R${payload.rightMode}:${payload.rightSpeed}`);
    }

    async function stopRawDrive(restoreStabilization = true) {
      clearInterval(driveRuntime.rawTimer);
      driveRuntime.rawTimer = null;
      driveRuntime.lastRaw = null;
      if (bot.connected) await bot.rawDriveMotors(0, 0, 0, 0).catch(() => {});
      if (restoreStabilization && bot.connected && $("stabilize").checked) {
        await bot.setStabilization(true).catch(() => {});
      }
      if (driveRuntime.prepared) setDriveReadyState("ready", "Tripod drive ready");
    }

    async function optionalRead(fn, fallback = []) {
      try {
        return await fn();
      } catch (error) {
        return fallback;
      }
    }

    function voltageBatteryPercent(volts, minVolts, maxVolts) {
      if (!Number.isFinite(volts) || !Number.isFinite(minVolts) || !Number.isFinite(maxVolts)) return null;
      if (maxVolts <= minVolts) return null;
      return Math.round(clamp((volts - minVolts) / (maxVolts - minVolts) * 100, 0, 100));
    }

    function updateBatteryPercentFromVoltage() {
      const percent = voltageBatteryPercent(lastBatteryVolts, number("batteryMin"), number("batteryMax"));
      $("batteryPct").textContent = percent === null ? "-" : `${percent}%`;
    }

    function applyCollisionPreset() {

    async function refreshPower() {
      const [volt, state, voltageState] = await Promise.all([
        optionalRead(() => bot.batteryVoltage()),
        optionalRead(() => bot.batteryState()),
        optionalRead(() => bot.batteryVoltageState())
      ]);
      const volts = volt.length ? intFrom(volt) / 100 : null;
      lastBatteryVolts = volts;
      updateBatteryPercentFromVoltage();
      $("batteryVolt").textContent = volts === null ? "-" : `${volts.toFixed(2)} V`;
      $("batteryState").textContent = state.length
        ? (BATTERY_STATES[state[0]] || state[0])
        : (voltageState.length ? (VOLTAGE_STATES[voltageState[0]] || voltageState[0]) : "-");
    }

    async function refreshInfo() {
      const [name, app, boot, sku] = await Promise.all([

    }

    function version(bytes) {
      const view = new DataView(new Uint8Array(bytes).buffer);
      return `${view.getUint16(0)}.${view.getUint16(2)}.${view.getUint16(4)}`;
    }

    function resizeGraphCanvas(canvas) {
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      const width = Math.max(320, Math.round(rect.width * dpr));
      const height = Math.max(150, Math.round(rect.height * dpr));
      if (canvas.width !== width || canvas.height !== height) {
        canvas.width = width;
        canvas.height = height;
      }
      return { width, height, dpr };
    }

    function scheduleStreamGraph() {
      if (streamGraphFrame) return;
      streamGraphFrame = requestAnimationFrame(drawStreamGraph);
    }

    function addStreamSample(values) {
      const now = performance.now();
      streamHistory.push({ ...values, _receivedAt: now });
      trimStreamHistory(now);
      scheduleStreamGraph();
    }

    function trimStreamHistory(now = performance.now()) {
      while (streamHistory.length && now - streamHistory[0]._receivedAt > STREAM_WINDOW_MS) {
        streamHistory.shift();
      }
    }

    function drawStreamGraph() {
      streamGraphFrame = 0;
      const canvas = $("streamGraph");
      if (!canvas) return;
      const { width, height, dpr } = resizeGraphCanvas(canvas);
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = "#080d11";
      ctx.fillRect(0, 0, width, height);

      const margin = 8 * dpr;
      const gap = 9 * dpr;
      const headerHeight = 28 * dpr;
      const axisWidth = 42 * dpr;
      const cellWidth = (width - margin * 2 - gap) / 2;
      const cellHeight = (height - margin * 2 - gap) / 2;
      const now = performance.now();
      trimStreamHistory(now);
      const windowStart = now - STREAM_WINDOW_MS;
      ctx.font = `${10 * dpr}px Consolas, Cascadia Mono, monospace`;
      ctx.lineWidth = 1 * dpr;

      streamGraphGroups.forEach((group, groupIndex) => {
        const col = groupIndex % 2;
        const row = Math.floor(groupIndex / 2);
        const x0 = margin + col * (cellWidth + gap);
        const y0 = margin + row * (cellHeight + gap);
        const x1 = x0 + cellWidth;
        const y1 = y0 + cellHeight;
        const plotX = x0 + axisWidth;
        const plotY = y0 + headerHeight;
        const plotRight = x1 - 8 * dpr;
        const plotBottom = y1 - 17 * dpr;
        const plotWidth = Math.max(40 * dpr, plotRight - plotX);
        const plotHeight = Math.max(30 * dpr, plotBottom - plotY);
        ctx.fillStyle = groupIndex % 2 ? "#0a1015" : "#0d1318";
        ctx.fillRect(x0, y0, cellWidth, cellHeight);
        ctx.strokeStyle = "rgba(255,255,255,0.08)";
        ctx.strokeRect(x0 + 0.5, y0 + 0.5, cellWidth - 1, cellHeight - 1);

        ctx.save();
        ctx.setLineDash([2 * dpr, 4 * dpr]);
        ctx.strokeStyle = "rgba(159,176,188,0.28)";
        ctx.beginPath();
        for (let i = 1; i < 4; i++) {
          const gx = plotX + plotWidth * i / 4;
          ctx.moveTo(gx, plotY);
          ctx.lineTo(gx, plotBottom);
        }
        for (let i = 1; i < 4; i++) {
          const gy = plotY + plotHeight * i / 4;
          ctx.moveTo(plotX, gy);
          ctx.lineTo(plotRight, gy);
        }
        ctx.stroke();
        ctx.restore();

        ctx.beginPath();
        const zeroY = plotBottom - ((0 - group.min) / (group.max - group.min)) * plotHeight;
        if (zeroY >= plotY && zeroY <= plotBottom) {
          ctx.moveTo(plotX, zeroY);
          ctx.lineTo(plotRight, zeroY);
        }
        ctx.stroke();

        ctx.fillStyle = "#9fb0bc";
        ctx.fillText(group.label, x0 + 8 * dpr, y0 + 14 * dpr);
        ctx.fillText(String(group.max), x0 + 8 * dpr, plotY + 9 * dpr);
        ctx.fillText("0", x0 + 8 * dpr, zeroY + 3 * dpr);
        ctx.fillText(String(group.min), x0 + 8 * dpr, plotBottom);

        let legendX = x0 + Math.min(cellWidth * 0.42, 112 * dpr);
        let legendY = y0 + 13 * dpr;
        group.fields.forEach(([field, color]) => {
          const name = field.replace(/^att\.|^acc\.|^gyro\.|^loc\.|^vel\./, "");
          const itemWidth = (name.length * 6 + 24) * dpr;
          if (legendX + itemWidth > x1 - 7 * dpr) {
            legendX = x0 + Math.min(cellWidth * 0.42, 112 * dpr);
            legendY += 12 * dpr;
          }
          ctx.fillStyle = color;
          ctx.fillRect(legendX, legendY - 6 * dpr, 10 * dpr, 2 * dpr);
          ctx.fillText(name, legendX + 11 * dpr, legendY);
          legendX += itemWidth;
        });

        group.fields.forEach(([field, color]) => {
          ctx.strokeStyle = color;
          ctx.beginPath();
          let started = false;
          streamHistory.forEach((sample) => {
            const raw = sample[field];
            if (!Number.isFinite(raw)) return;
            const value = clamp(raw, group.min, group.max);
            const ageRatio = (sample._receivedAt - windowStart) / STREAM_WINDOW_MS;
            if (ageRatio < 0 || ageRatio > 1) return;
            const x = plotX + ageRatio * plotWidth;
            const y = plotBottom - ((value - group.min) / (group.max - group.min)) * plotHeight;
            if (!started) {
              ctx.moveTo(x, y);
              started = true;
            } else {
              ctx.lineTo(x, y);
            }
          });
          if (started) ctx.stroke();
        });
      });
    }

    function parseStream(bytes) {
      const view = new DataView(new Uint8Array(bytes).buffer);
      const values = {};
      for (let i = 0; i < Math.floor(bytes.length / 4) && i < SENSOR_FIELDS.length; i++) {
        const [name, mode] = SENSOR_FIELDS[i];
        let current = view.getFloat32(i * 4, false);
        if (mode === "f100") current *= 100;
        values[name] = current;
      }
      if (Object.keys(values).length) addStreamSample(values);
    }

    function parseCollision(bytes) {
      const view = new DataView(new Uint8Array(bytes).buffer);
      if (bytes.length < 18) return "collision";
      const ax = view.getInt16(0, false) / 4096;
      const ay = view.getInt16(2, false) / 4096;
      const az = view.getInt16(4, false) / 4096;
      const axes = bytes[6];
      const powerX = view.getInt16(7, false);
      const powerY = view.getInt16(9, false);
      const powerZ = view.getInt16(11, false);
      const speed = bytes[13];
      const time = view.getUint32(14, false) / 1000;
      return `collision ${axes & 1 ? "x" : ""}${axes & 2 ? "y" : ""} a:${ax.toFixed(2)},${ay.toFixed(2)},${az.toFixed(2)} p:${powerX},${powerY},${powerZ} s:${speed} t:${time.toFixed(2)}`;
    }

    function bindJoystick() {
      const pad = $("joystick");
      const stick = $("stick");
      let active = false;
      let last = 0;

      const move = async (event) => {
        if (!active) return;
        const rect = pad.getBoundingClientRect();
        const radius = rect.width / 2;
        const x = clamp(event.clientX - rect.left - radius, -radius, radius);
        const y = clamp(event.clientY - rect.top - radius, -radius, radius);
        const dist = Math.min(radius, Math.hypot(x, y));
        const angle = Math.atan2(x, -y);
        const heading = Math.round((angle * 180 / Math.PI + 360) % 360);
        const speed = Math.round(dist / radius * number("speed"));
        const scale = dist / Math.max(1, Math.hypot(x, y));
        stick.style.transform = `translate(${x * scale}px, ${y * scale}px)`;
        $("heading").value = heading;
        const now = performance.now();
        if (now - last > 130 && bot.connected) {
          last = now;
          if (!driveRuntime.prepared) {
            prepareDriveStance().catch((error) => log(`Prepare drive ${error.message}`));
            return;
          }
          driveRuntime.lastRoll = { speed, heading, flags: driveFlags() };
          ensureRollLoop();
          bot.drive(speed, heading, driveFlags()).catch((error) => log(`Drive ${error.message}`));
        }
      };

      pad.addEventListener("pointerdown", (event) => {
        active = true;
        pad.setPointerCapture(event.pointerId);
        if (bot.connected && !driveRuntime.prepared) {
          prepareDriveStance()
            .then(() => { if (active) move(event); })
            .catch((error) => log(`Prepare drive ${error.message}`));
        }
        move(event);
      });
      pad.addEventListener("pointermove", move);
      pad.addEventListener("pointerup", async () => {
        active = false;
        stick.style.transform = "";
        if (bot.connected) await stopRoll();
      });
      pad.addEventListener("pointercancel", async () => {
        active = false;
        stick.style.transform = "";
        if (bot.connected) await stopRoll();
      });
    }

    populateSelects();
    applyTooltips();
    bind();
    window.addEventListener("resize", scheduleStreamGraph);
    scheduleStreamGraph();
    setConnectionControls(false);
    setStatus(navigator.bluetooth ? "" : "bad", navigator.bluetooth ? "Idle" : "Use Chrome or Edge over localhost/HTTPS");
  </script>
</body>
</html>
